<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Murli Drag Quiz</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-beta.2/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-beta.2/scroll-behaviour.min.js"></script>
<script>
  // Initialize touch polyfill with Auto-Scroll turned on
  MobileDragDrop.polyfill({ 
      holdToDrag: 0,
      dragImageTranslateOverride: MobileDragDrop.scrollBehaviourDragImageTranslateOverride
  });
  // Prevent screen scrolling while dragging
  window.addEventListener('touchmove', function() {}, {passive: false});
</script>

<style>
:root {
  var(--font-sans): -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  var(--glass-bg): rgba(255, 255, 255, 0.55);
  var(--glass-border): rgba(255, 255, 255, 0.8);
  var(--glass-shadow): 0 8px 32px rgba(0, 0, 0, 0.06);
  var(--color-text-primary): #1d1d1f; 
  var(--color-text-secondary): #515154;
  var(--color-text-tertiary): #86868b;
  var(--color-accent): #007aff; 
  var(--color-success): #34c759; 
  var(--color-error): #ff3b30; 
  var(--border-radius-md): 16px; 
  var(--border-radius-lg): 24px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body { 
  background-color: #f2f2f7;
  background-image: 
    radial-gradient(circle at 15% 10%, #dcd3ff 0%, transparent 40%),
    radial-gradient(circle at 85% 20%, #c4e0ff 0%, transparent 40%),
    radial-gradient(circle at 50% 80%, #ffd1e8 0%, transparent 40%);
  background-attachment: fixed;
  -webkit-tap-highlight-color: transparent; 
  overscroll-behavior-y: none; /* Stops pull-to-refresh while dragging */
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

.wrap{padding:2rem 1.25rem;max-width:640px;margin:auto;min-height: 100vh;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.lbl{font-size:14px;font-weight:500;color: #515154;}
.scr{font-size:17px;font-weight:700;color:#1d1d1f;letter-spacing:-0.5px;}

.prog-bg{height:8px;background:rgba(0,0,0,0.05);border-radius:4px;margin-bottom:1.5rem;overflow:hidden;}
.prog-fill{height:8px;background:#007aff;border-radius:4px;transition:width 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);}
.round-lbl{font-size:14px;color:#515154;margin-bottom:1.25rem;text-align:center;font-weight:500;}

.col-head-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.col-head{font-size:12px;font-weight:600;color:#86868b;text-align:center;text-transform:uppercase;letter-spacing:1px;}

.match-list{display:flex;flex-direction:column;gap:12px;margin-bottom:2rem;}
.match-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* GLASSMORPHISM CLASSES */
.glass-card {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.8);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
  border-radius: 16px;
}

.q-card{padding:14px 16px;font-size:14px;font-weight:500;color:#1d1d1f;line-height:1.4;display:flex;align-items:center;}

.drop-zone{
  background: rgba(255,255,255,0.3);
  border: 2px dashed rgba(0,0,0,0.1);
  border-radius: 16px;
  padding:10px 12px;
  font-size:14px;
  font-weight:500;
  color:#86868b;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  min-height: 56px;
}

.drop-zone.over{background:rgba(0, 122, 255, 0.1); border-color:#007aff; transform: scale(1.02);}

.drop-zone.filled{
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid #007aff;
  color:#007aff;
  justify-content:space-between;
  cursor:pointer;
  box-shadow: 0 4px 12px rgba(0, 122, 255, 0.1);
}

.drop-zone.correct{background: rgba(52, 199, 89, 0.15); border-color: #34c759; color: #1a6e30;}
.drop-zone.wrong{background: rgba(255, 59, 48, 0.15); border-color: #ff3b30; color: #8a1913;}

.drag-pool{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:2rem;justify-content: center;}
.drag-chip{
  padding:12px 18px;font-size:15px;font-weight:500;color:#1d1d1f;cursor:grab;user-select:none;transition:all 0.2s;touch-action: none;
} 
.drag-chip:active{transform: scale(0.95); background: rgba(255,255,255,0.8);}
.drag-chip.dragging{opacity:0.6; transform: scale(1.1); box-shadow: 0 15px 30px rgba(0,0,0,0.15);}
.drag-chip.used{display:none;}

.btn-row{display:flex;gap:12px;justify-content:center;margin-top:1rem;}
.btn{
  padding:14px 24px;font-size:16px;font-weight:600;border-radius: 20px;cursor:pointer;
  border: 1px solid rgba(0,0,0,0.1);background: rgba(255,255,255,0.5);
  backdrop-filter: blur(10px);-webkit-backdrop-filter: blur(10px);
  color:#1d1d1f;flex:1;max-width: 180px;transition:all 0.2s;
}
.btn:active{transform: scale(0.96);}
.btn-primary{background: #007aff;color:#fff;border:none;box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);}
.btn-primary:active{background: #005bb5;}

.remove-btn{font-size:12px;color:#007aff;cursor:pointer;padding:4px 8px;background: rgba(0,122,255,0.1);border-radius:12px;transition:background 0.2s;}

.final-card{padding:3rem 1.5rem;text-align:center;border-radius:24px;}
.final-score{font-size:56px;font-weight:700;letter-spacing:-1px;color:#1d1d1f;margin:1rem 0;}
.final-msg{font-size:17px;font-weight:500;color:#515154;margin-bottom:1.5rem;}
.badge{display:inline-block;padding:6px 14px;border-radius: 16px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;background:#007aff;color:#fff;box-shadow: 0 4px 12px rgba(0,122,255,0.3);}

.lb-container {text-align:left; margin-top:20px; background: rgba(255,255,255,0.4); border-radius:24px; padding:20px;max-height: 350px;overflow-y: auto;}
.lb-title {font-size:16px; margin-bottom:15px; color:#1d1d1f; text-align:center; font-weight:700;}
.lb-item {margin-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px;}
.lb-name { font-weight:600; font-size:15px; }
.lb-date { color:#86868b; font-size:12px; font-weight:500; }
.lb-score { font-weight:700; color:#007aff; font-size:15px; }

@media (max-width: 360px) {
  .col-head-row { display: none; } 
  .match-row { display: flex; flex-direction: column; gap: 6px; padding-bottom: 16px; border-bottom: 1px solid rgba(0,0,0,0.05); }
  .q-card { border: none; padding: 6px 4px; background: transparent; box-shadow: none; backdrop-filter:none;}
  .drop-zone { width: 100%; }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <span class="lbl" id="rlbl">Round 1 / 2</span>
    <span class="scr" id="scr">Score: 0</span>
  </div>
  <div class="prog-bg"><div class="prog-fill" id="prog" style="width:50%"></div></div>
  <div id="game-area"></div>
</div>

<script>
// ==========================================
// 1. FIREBASE SETUP
// !!! PASTE YOUR FIREBASE CONFIG HERE !!!
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyDqoqpUFUkShdXMy21MEWhKsHKFlQUyNPo",
  authDomain: "murliquizleaderboard.firebaseapp.com",
  projectId: "murliquizleaderboard",
  storageBucket: "murliquizleaderboard.firebasestorage.app",
  messagingSenderId: "22978189390",
  appId: "1:22978189390:web:3b8cc0e44d12e181288b1f",
  measurementId: "G-7SEZBTTKZR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
// ==========================================

const rounds = [
  {
    pairs:[
      {q:"எதன் கதவை மூடிவிட்டால் மாயையின் புயல் வருவது முற்றிலும் நின்றுவிடும்?", a:"தேக அபிமானம்"},
      {q:"கலியுகத்திலும் இல்லாமல், சத்திய யுகத்திலும் இல்லாமல் பிராமணர்களின் படகு எங்கு உள்ளது?", a:"நடுக்கடலில்"},
      {q:"எந்த யுகம் வரை வந்துவிடுகின்ற பொழுது கர்மேந்திரியங்களின் சஞ்சலத் தன்மை முடிந்துவிடும்?", a:"வெள்ளி யுகம்"},
      {q:"கடைசி நேரத்தில் வேறு தேகதாரிகளின் நினைவு வந்தால் என்ன ஆகும்?", a:"பதவி கீழானதாகும்"},
      {q:"முழு நாளும் ஞானத்தை அசைப்போடாதவர்களை பாபா என்னவென்று கூறுகிறார்?", a:"ஆரோக்கியமற்றவர்கள்"}
    ]
  },
  {
    pairs:[
      {q:"அசுர மனிதர்கள் கூட கொடிய மிருகங்களை எதன் மூலம் வசப்படுத்துகிறார்கள்?", a:"அன்பினால்"},
      {q:"எல்லையற்ற வியாபாரத்தில் முன்னால் செல்வதற்கு எந்த குணம் அவசியம் வேண்டும்?", a:"தைரியத்துடன் தாரணை"},
      {q:"யாருக்கு முழுமையான நிச்சயபுத்தி இருக்கின்றதோ அந்த கோபிகைகள் முதலிலேயே எதை அனுப்புகிறார்கள்?", a:"பரிசை"},
      {q:"எந்த மகிழ்ச்சியில் நிலைத்திருந்தால் மாயாவின் அடிமைத்தனம் முடிந்து போகும்?", a:"அத்தாரிட்டி சொரூபம்"},
      {q:"உள்ளுக்குள் எந்த நினைவு இருந்தால் சிவாலயம் நமக்குத் தூரத்தில் இல்லை?", a:"ஒரு பாபாவின் நினைவு"}
    ]
  }
];

// ADDED startTime variable to track when the quiz begins
let round=0, score=0, zoneData={}, dragId=null, checked=false, startTime=null;

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

function render(){
  const area=document.getElementById('game-area');
  
  // Start the timer when the first round renders
  if(startTime === null) {
      startTime = Date.now();
  }

  if(round>=rounds.length){
    // CALCULATE TIME TAKEN
    const endTime = Date.now();
    const durationMs = endTime - startTime;
    const totalSeconds = Math.floor(durationMs / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    const timeTakenStr = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;

    // Loading State
    area.innerHTML = `<div class="final-card glass-card"><div class="final-msg">Launching Leaderboard...</div></div>`;

    let playerName = prompt("Game Over! Enter your name:") || "Anonymous Player";
    
    // Save to Firebase (Now includes timeTaken and durationSeconds)
    db.collection("leaderboard").add({
      name: playerName.substring(0, 20), 
      score: score,
      timeTaken: timeTakenStr,
      durationSeconds: totalSeconds,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      // Fetch Top Leaderboard (You can update "desc" to "asc" if you want to sort by something else later)
      db.collection("leaderboard")
        .orderBy("score", "desc").orderBy("durationSeconds", "asc")
        .limit(20)
        .get()
        .then((snapshot) => {
          let boardHTML = `<div class="lb-container">`;
          boardHTML += `<h3 class="lb-title">TOP SCORERS</h3>`;
          boardHTML += `<ol style="padding-left:0; list-style-position: inside; margin:0;">`;
          
          snapshot.forEach((doc) => {
            let data = doc.data();
            let timeString = "";
            if (data.timestamp) {
                let dateObj = data.timestamp.toDate();
                timeString = dateObj.toLocaleDateString() + ", " + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
            
            // Add Time Taken display if it exists in the database
            let timeTakenDisplay = data.timeTaken ? ` &bull; ⏱️ ${data.timeTaken}` : "";

            boardHTML += `
              <li class="lb-item">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                  <span>
                    <div class="lb-name">${data.name}</div> 
                    <div class="lb-date">${timeString}${timeTakenDisplay}</div>
                  </span>
                  <span class="lb-score">${data.score} pts</span>
                </div>
              </li>`;
          });
          
          boardHTML += `</ol></div>`;

          // Render Final Screen
          area.innerHTML=`<div class="final-card glass-card">
            <div class="badge">Murli Drag Quiz</div>
            <div class="final-score">${score} <span style="font-size:32px; color:#86868b">/ ${rounds.reduce((s,r)=>s+r.pairs.length,0)}</span></div>
            <div class="final-msg">Completed in: <strong>${timeTakenStr}</strong><br><br>${score>=8?'Wow! Excellent!':score>=5?'Good effort! Keep practicing.':'Try again!'}</div>
            
            ${boardHTML}

            <button class="btn btn-primary" style="margin-top:24px; width:100%; max-width:none;" onclick="restart()">Play Again</button>
          </div>`;
      });
    }).catch((error) => {
      console.error("Error saving score: ", error);
      area.innerHTML = `<div class="final-card glass-card"><div class="final-msg">Connection Error. Couldn't load leaderboard.</div><button class="btn btn-primary" onclick="restart()">Play Again</button></div>`;
    });
    
    return;
  }
  
  checked=false;
  zoneData={};
  const r=rounds[round];
  const answers=shuffle(r.pairs.map(p=>p.a));
  document.getElementById('rlbl').textContent=`Round ${round+1} of ${rounds.length}`;
  document.getElementById('prog').style.width=((round+1)/rounds.length*100)+'%';

  let rowsHTML='';
  r.pairs.forEach((p,i)=>{
    rowsHTML+=`
    <div class="match-row">
      <div class="q-card glass-card">${p.q}</div>
      <div class="drop-zone" id="zone-${i}" data-idx="${i}" 
        ondragover="ev(event)" ondragleave="el(event)" ondrop="drop(event,${i})">
        <span>Drop here</span>
      </div>
    </div>`;
  });

  let chipsHTML='';
  answers.forEach((a,i)=>{
    chipsHTML+=`<div class="drag-chip glass-card" id="chip-${i}" draggable="true"
      ondragstart="ds(event,'${a}','chip-${i}')"
      ondragend="de(event)">${a}</div>`;
  });

  area.innerHTML=`
    <div class="round-lbl"><h3>OM SHANTI</h3></div>
    <div class="round-lbl">Drag the correct answer and drop it next to the question</div>
    <div class="col-head-row">
      <div class="col-head">Question</div>
      <div class="col-head">Answer</div>
    </div>
    <div class="match-list">${rowsHTML}</div>
    <div class="col-head" style="margin-bottom:12px;">Options</div>
    <div class="drag-pool">${chipsHTML}</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkAnswers()">Check Answers</button>
      <button class="btn" onclick="resetRound()">Reset</button>
    </div>
  `;
}

function ds(e,val,chipId){dragId={val,chipId};e.target.classList.add('dragging');}
function de(e){e.target.classList.remove('dragging');}
function ev(e){e.preventDefault();e.currentTarget.classList.add('over');}
function el(e){e.currentTarget.classList.remove('over');}

function drop(e,idx){
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  if(!dragId||checked)return;
  const prev=zoneData[idx];
  if(prev){
    const oldChip=document.getElementById(prev.chipId);
    if(oldChip)oldChip.classList.remove('used');
  }
  zoneData[idx]=dragId;
  const chip=document.getElementById(dragId.chipId);
  if(chip)chip.classList.add('used');
  const zone=document.getElementById('zone-'+idx);
  zone.className='drop-zone filled';
  zone.innerHTML=`<span>${dragId.val}</span><span class="remove-btn" onclick="removeFromZone(${idx})">✕</span>`;
  dragId=null;
}

function removeFromZone(idx){
  if(checked)return;
  const d=zoneData[idx];
  if(!d)return;
  const chip=document.getElementById(d.chipId);
  if(chip)chip.classList.remove('used');
  delete zoneData[idx];
  const zone=document.getElementById('zone-'+idx);
  zone.className='drop-zone';
  zone.innerHTML=`<span>Drop here</span>`;
}

function checkAnswers(){
  if(checked)return;
  checked=true;
  const r=rounds[round];
  let gained=0;
  r.pairs.forEach((p,i)=>{
    const zone=document.getElementById('zone-'+i);
    const placed=zoneData[i];
    if(placed && placed.val===p.a){
      zone.className='drop-zone correct glass-card';
      zone.innerHTML=`<span>${placed.val}</span><span style="font-size:16px;">✓</span>`;
      gained++;
    } else {
      zone.className='drop-zone wrong glass-card';
      const shown=placed?placed.val:'—';
      zone.innerHTML=`<span style="text-decoration:line-through">${shown}</span><span style="font-size:13px;margin-left:6px;font-weight:600;">→ ${p.a}</span>`;
    }
  });
  score+=gained;
  document.getElementById('scr').textContent=`Score: ${score}`;
  const btnRow=document.querySelector('.btn-row');
  btnRow.innerHTML=`<button class="btn btn-primary" style="width:100%; max-width:none;" onclick="nextRound()">${round<rounds.length-1?'Next Round →':'View Results'}</button>`;
}

function nextRound(){round++;render();}
function resetRound(){zoneData={};render();}

// ADDED: Reset startTime to null when they replay so the timer resets
function restart(){round=0;score=0;startTime=null;render();}

// Start the game!
render();
</script>
</body>
</html>
