<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Murli Bubble Builder</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --glass-bg: rgba(255, 255, 255, 0.55);
    --glass-border: rgba(255, 255, 255, 0.8);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    --color-text-primary: #1d1d1f; 
    --color-text-secondary: #515154;
    --color-text-tertiary: #86868b;
    --color-accent: #007aff; 
    --color-success: #34c759; 
    --color-error: #ff3b30; 
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { 
    background-color: #f2f2f7;
    background-image: 
      radial-gradient(circle at 15% 10%, #dcd3ff 0%, transparent 40%),
      radial-gradient(circle at 85% 20%, #c4e0ff 0%, transparent 40%),
      radial-gradient(circle at 50% 80%, #ffd1e8 0%, transparent 40%);
    background-attachment: fixed;
    -webkit-tap-highlight-color: transparent; 
    font-family: var(--font-sans);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px 15px;
  }

  #app { width: 100%; max-width: 600px; }

  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: 24px;
    padding: 24px 20px;
  }

  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .lbl { font-size: 14px; font-weight: 600; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  .scr { font-size: 16px; font-weight: 700; color: var(--color-text-primary); }

  .prog-bg { height: 6px; background: rgba(0,0,0,0.05); border-radius: 3px; margin-bottom: 24px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--color-accent); transition: width 0.4s cubic-bezier(0.25, 0.1, 0.25, 1); }

  .question-text {
    font-size: 18px; font-weight: 600; color: var(--color-text-primary);
    line-height: 1.5; margin-bottom: 24px; text-align: center; min-height: 54px;
  }

  .answer-area {
    min-height: 70px; background: rgba(255, 255, 255, 0.4);
    border: 2px dashed rgba(0,0,0,0.15); border-radius: 20px;
    display: flex; flex-wrap: wrap; gap: 10px; padding: 12px;
    margin-bottom: 30px; justify-content: center; align-items: center;
  }

  .bubble-pool { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; min-height: 120px; }

  .bubble {
    background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.1);
    border-radius: 20px; padding: 12px 18px; font-size: 16px; font-weight: 500;
    color: var(--color-text-primary); cursor: pointer; user-select: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.1s;
  }

  .bubble:active { transform: scale(0.95); }
  .answer-area .bubble { background: var(--color-accent); color: white; border-color: var(--color-accent); }

  .success-flash { background: rgba(52, 199, 89, 0.15); border-color: var(--color-success); }
  .success-flash .bubble { background: var(--color-success); border-color: var(--color-success); }

  .error-shake { animation: shake 0.4s both; background: rgba(255, 59, 48, 0.15); border-color: var(--color-error); }
  .error-shake .bubble { background: var(--color-error); border-color: var(--color-error); }

  @keyframes shake {
    10%, 90% { transform: translate3d(-2px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
    40%, 60% { transform: translate3d(6px, 0, 0); }
  }

  .hidden { visibility: hidden; opacity: 0; pointer-events: none; position: absolute; }
  .locked { pointer-events: none; }

  .final-score { font-size: 56px; font-weight: 700; color: var(--color-text-primary); margin: 10px 0; }
  .btn-primary { 
    padding: 16px 24px; font-size: 16px; font-weight: 600; border-radius: 24px; 
    cursor: pointer; background: var(--color-accent); color: white; border: none; 
    width: 100%; transition: transform 0.2s; 
  }

  .lb-container { text-align: left; margin-top: 20px; background: rgba(255,255,255,0.4); border-radius: 20px; padding: 20px; max-height: 350px; overflow-y: auto; }
  .lb-title { font-size: 16px; margin-bottom: 15px; text-align: center; font-weight: 700; }
  .lb-item { margin-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px; }
  .lb-name { font-weight: 600; font-size: 15px; }
  .lb-date { color: var(--color-text-tertiary); font-size: 12px; }
  .lb-score { font-weight: 700; color: var(--color-accent); font-size: 15px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ==========================================
// 1. FIREBASE SETUP
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyDqoqpUFUkShdXMy21MEWhKsHKFlQUyNPo",
  authDomain: "murliquizleaderboard.firebaseapp.com",
  projectId: "murliquizleaderboard",
  storageBucket: "murliquizleaderboard.firebasestorage.app",
  messagingSenderId: "22978189390",
  appId: "1:22978189390:web:3b8cc0e44d12e181288b1f",
  measurementId: "G-7SEZBTTKZR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 1. GAME DATA - 10 Questions from Murali (25-04-2026)
const questions = [
  { 
    q: "நிச்சய புத்தி உள்ள குழந்தைகள் கண்ணை மூடிக் கொண்டு பாபாவின் _________ நடந்துக் கொண்டே இருப்பார்கள், பாபா அவர்களுக்குப் _________ இருக்கிறார்.", 
    correctOrder: ["ஸ்ரீமத்படி", "பொறுப்புள்ளவராக"], 
    options: ["ஸ்ரீமத்படி", "பொறுப்புள்ளவராக", "வழியில்", "உதவியாக", "சொல் படி", "நண்பராக"] 
  },
  { 
    q: "உயர்ந்த வரிலும் உயர்ந்தவர் ஒரே ஒரு _________ மட்டுமே, அவர் தாமே வந்து _________ மற்றும் தம்மைப் பற்றிய அறிமுகம் கொடுக்கிறார்.", 
    correctOrder: ["தந்தை", "ஆத்மா"], 
    options: ["தந்தை", "ஆத்மா", "குரு", "உடல்", "மனிதன்", "சிருஷ்டி"] 
  },
  { 
    q: "நட்சத்திரம் போல் இருக்கும் _________ மிகவும் சூட்சுமமானது, அது _________ மத்தியில் அமர்ந்துள்ளது.", 
    correctOrder: ["ஆத்மா", "புருவ"], 
    options: ["ஆத்மா", "புருவ", "ஜோதி", "கண்கள்", "உயிர்", "இதய"] 
  },
  { 
    q: "தந்தை மனித சிருஷ்டியின் _________ வடிவமாக, _________ நிறைந்தவராக உள்ளார்.", 
    correctOrder: ["விதை", "ஞானம்"], 
    options: ["விதை", "ஞானம்", "அரசன்", "சக்தி", "வேர்", "அன்பு"] 
  },
  { 
    q: "இராவண இராஜ்யம் _________ யுகத்திலிருந்து ஆரம்பமாகிறது, இது _________ தேசமாகும்.", 
    correctOrder: ["துவாபர", "வேறொரு"], 
    options: ["துவாபர", "வேறொரு", "கலி", "சொந்த", "சத்யுக", "பாவ"] 
  },
  { 
    q: "ஆத்மாவும் பரமாத்மாவும் பிந்தியாக இருந்தாலும், ஆத்மா _________ அடைகின்றது, பரமாத்மா _________ இல்லாதவர்.", 
    correctOrder: ["தூய்மையற்றதாகின்றது", "பிறப்பு-இறப்பு"], 
    options: ["தூய்மையற்றதாகின்றது", "பிறப்பு-இறப்பு", "அழிவை", "துக்கம்", "மாற்றத்தை", "சரீரம்"] 
  },
  { 
    q: "எப்போதும் _________ தான் சொல்கிறார் எனப் புரிந்துக் கொள்ளுங்கள், பொறுப்பு அவருடையதாக இருக்கும், இந்த _________ சரி செய்து விடுவார்.", 
    correctOrder: ["சிவபாபா", "இரதத்தை"], 
    options: ["சிவபாபா", "இரதத்தை", "பிரம்மா", "உலகத்தை", "தானே வந்து", "விஷயத்தை"] 
  },
  { 
    q: "எலும்பு தேய _________ செய்ய வேண்டும், அனைவரையும் _________ மாலிக்காக ஆக்க வேண்டும்.", 
    correctOrder: ["சேவை", "சுகதாமத்திற்கு"], 
    options: ["சேவை", "சுகதாமத்திற்கு", "வேலை", "புது யுகத்தின்", "பக்தி", "சாந்திதாமத்திற்கு"] 
  },
  { 
    q: "யோகயுக்ததாக இருப்பவரின் அடையாளம் _________ ஆவது, ஸ்ரீமத்தில் தனது _________ கலப்பது அபிமானமாகும்.", 
    correctOrder: ["பந்தனமுக்த்", "புத்தியை"], 
    options: ["பந்தனமுக்த்", "புத்தியை", "பற்றற்றவர்", "மனதை", "வெற்றியாளர்", "ஆசையை"] 
  },
  { 
    q: "முதலில் _________ அதன் பின் _________ தான் ஞானம் நிறைந்த ஆத்மாவின் குணம்.", 
    correctOrder: ["சிந்தித்து", "செயல்படுவது"], 
    options: ["சிந்தித்து", "செயல்படுவது", "பேசி", "செய்வது", "பார்த்து", "நடிப்பது"] 
  }
];


  
let currentLevel = 0, score = 0, selectedBubbles = [], startTime = null;
const appDiv = document.getElementById('app');

function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

function initGame() {
  currentLevel = 0; score = 0; startTime = Date.now();
  appDiv.innerHTML = `
    <div class="glass-card">
      <div class="topbar">
        <span class="lbl" id="q-lbl">Q 1 / ${questions.length}</span>
        <span class="scr">Score: <span id="s-lbl">0</span></span>
      </div>
      <div class="prog-bg"><div class="prog-fill" id="prog-bar" style="width:0%"></div></div>
      <div class="question-text" id="question">Loading...</div>
      <div class="answer-area" id="answer-area"></div>
      <div class="bubble-pool" id="bubble-pool"></div>
    </div>`;
  loadLevel();
}

function loadLevel() {
  if (currentLevel >= questions.length) { endGame(); return; }
  const levelData = questions[currentLevel];
  document.getElementById('q-lbl').innerText = `Q ${currentLevel + 1} / ${questions.length}`;
  document.getElementById('s-lbl').innerText = score;
  document.getElementById('prog-bar').style.width = `${(currentLevel / questions.length) * 100}%`;
  
  const questionEl = document.getElementById('question'), poolArea = document.getElementById('bubble-pool'), answerArea = document.getElementById('answer-area');
  questionEl.innerHTML = levelData.q; answerArea.innerHTML = ''; poolArea.innerHTML = ''; selectedBubbles = [];
  answerArea.classList.remove('success-flash', 'error-shake', 'locked'); poolArea.classList.remove('locked');

  shuffle([...levelData.options]).forEach((word, index) => {
    const btn = document.createElement('div'); btn.className = 'bubble'; btn.innerText = word;
    btn.onclick = () => moveToAnswer(btn, word);
    poolArea.appendChild(btn);
  });
}

function moveToAnswer(btnElement, word) {
  btnElement.classList.add('hidden'); selectedBubbles.push(word);
  const answerArea = document.getElementById('answer-area');
  const clone = document.createElement('div'); clone.className = 'bubble'; clone.innerText = word;
  clone.onclick = () => {
    clone.remove(); btnElement.classList.remove('hidden');
    selectedBubbles = selectedBubbles.filter(w => w !== word);
  };
  answerArea.appendChild(clone);
  if (selectedBubbles.length === questions[currentLevel].correctOrder.length) checkAnswer();
}

function checkAnswer() {
  const answerArea = document.getElementById('answer-area'), poolArea = document.getElementById('bubble-pool'), questionEl = document.getElementById('question');
  const isCorrect = selectedBubbles.every((val, index) => val === questions[currentLevel].correctOrder[index]);
  poolArea.classList.add('locked'); answerArea.classList.add('locked');
  if (isCorrect) {
    score++; document.getElementById('s-lbl').innerText = score;
    answerArea.classList.add('success-flash'); questionEl.innerHTML = `<span style="color: var(--color-success);">✓ Perfect!</span>`;
  } else {
    answerArea.classList.add('error-shake'); questionEl.innerHTML = `<span style="color: var(--color-error);">✗ Incorrect</span>`;
  }
  setTimeout(() => { currentLevel++; loadLevel(); }, 1500);
}

function endGame() {
  const totalSeconds = Math.floor((Date.now() - startTime) / 1000);
  const minutes = Math.floor(totalSeconds / 60), seconds = totalSeconds % 60;
  const timeTakenStr = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;

  appDiv.innerHTML = `<div class="glass-card" style="text-align:center;"><div class="question-text">Saving Score...</div></div>`;
  let playerName = prompt("Game Over! Enter your name:") || "Player";

  db.collection("leaderboard").add({
    name: playerName.substring(0, 20), score: score, timeTaken: timeTakenStr,
    durationSeconds: totalSeconds, timestamp: firebase.firestore.FieldValue.serverTimestamp()
  }).then(() => {
    const today = new Date(); today.setHours(0,0,0,0);
    
    // Fetch today's scores
    db.collection("leaderboard")
      .where("timestamp", ">=", today)
      .orderBy("timestamp", "desc")
      .get()
      .then((snapshot) => {
        let scoresArr = [];
        snapshot.forEach(doc => scoresArr.push(doc.data()));

        // SORT: Highest Score, then Fastest Time
        scoresArr.sort((a, b) => b.score - a.score || a.durationSeconds - b.durationSeconds);

        let boardHTML = `<div class="lb-container"><h3 class="lb-title">LEADERBOARD</h3><ol style="padding-left:0; list-style-position: inside; margin:0;">`;
        scoresArr.slice(0, 10).forEach((data) => {
          let timeDisplay = data.timestamp ? data.timestamp.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";
          boardHTML += `
            <li class="lb-item">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <span><div class="lb-name">${data.name}</div><div class="lb-date">${timeDisplay} &bull; ⏱️ ${data.timeTaken}</div></span>
                <span class="lb-score">${data.score} pts</span>
              </div>
            </li>`;
        });
        boardHTML += `</ol></div>`;

        appDiv.innerHTML = `
          <div class="glass-card" style="text-align:center;">
            <div class="final-score">${score} <span style="font-size:32px; color:var(--color-text-tertiary)">/ ${questions.length}</span></div>
            <p style="margin-bottom:20px;">Time: <strong>${timeTakenStr}</strong></p>
            ${boardHTML}
            <button class="btn-primary" style="margin-top:24px;" onclick="initGame()">Play Again</button>
          </div>`;
      });
  }).catch(() => {
    appDiv.innerHTML = `<div class="glass-card" style="text-align:center;"><h2>Connection Error</h2><button class="btn-primary" onclick="initGame()">Try Again</button></div>`;
  });
}

initGame();
</script>
</body>
</html>
