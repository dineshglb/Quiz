
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{padding:1.5rem 0;max-width:640px;margin:auto;font-family:var(--font-sans);}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.lbl{font-size:13px;color:var(--color-text-secondary);}
.scr{font-size:15px;font-weight:500;color:var(--color-text-primary);}
.prog-bg{height:4px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:1.5rem;}
.prog-fill{height:4px;background:#D85A30;border-radius:2px;transition:width 0.4s;}
.round-lbl{font-size:12px;color:var(--color-text-secondary);margin-bottom:0.75rem;text-align:center;}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem;}
.col-head{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;text-align:center;}
.q-list,.a-list{display:flex;flex-direction:column;gap:8px;}
.q-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:13px;color:var(--color-text-primary);line-height:1.5;min-height:52px;display:flex;align-items:center;}
.drop-zone{background:var(--color-background-secondary);border:0.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:13px;color:var(--color-text-tertiary);min-height:52px;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.drop-zone.over{background:#FAECE7;border-color:#D85A30;}
.drop-zone.filled{background:var(--color-background-primary);border-style:solid;color:var(--color-text-primary);justify-content:space-between;cursor:pointer;}
.drop-zone.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041;}
.drop-zone.wrong{background:#FCEBEB;border-color:#E24B4A;color:#501313;}
.drag-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.25rem;}
.drag-chip{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 14px;font-size:13px;color:var(--color-text-primary);cursor:grab;user-select:none;transition:background 0.15s;}
.drag-chip:hover{background:var(--color-background-secondary);}
.drag-chip.dragging{opacity:0.4;}
.drag-chip.used{display:none;}
.btn-row{display:flex;gap:10px;justify-content:center;margin-top:0.5rem;}
.btn{padding:9px 22px;font-size:14px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);}
.btn:hover{background:var(--color-background-secondary);}
.btn-primary{background:#D85A30;color:#fff;border-color:#D85A30;}
.btn-primary:hover{background:#993C1D;}
.remove-btn{font-size:11px;color:var(--color-text-secondary);cursor:pointer;padding:2px 6px;border:0.5px solid var(--color-border-tertiary);border-radius:4px;}
.remove-btn:hover{background:var(--color-background-secondary);}
.final-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem;text-align:center;}
.final-score{font-size:42px;font-weight:500;color:#D85A30;margin:1rem 0;}
.final-msg{font-size:15px;color:var(--color-text-secondary);margin-bottom:1.5rem;}
.badge{display:inline-block;padding:4px 12px;border-radius:var(--border-radius-md);font-size:12px;margin-bottom:1rem;background:#FAECE7;color:#4A1B0C;}
</style>

<div class="wrap">
  <div class="topbar">
    <span class="lbl" id="rlbl">राउंड 1 / 2</span>
    <span class="scr" id="scr">अंक: 0</span>
  </div>
  <div class="prog-bg"><div class="prog-fill" id="prog" style="width:50%"></div></div>
  <div id="game-area"></div>
</div>

<script>
const rounds = [
  {
    pairs:[
      {q:"कलकत्ता की सबसे बड़ी नदी?", a:"ब्रह्मपुत्रा"},
      {q:"ब्रह्मा का असली नाम?", a:"लखीराज"},
      {q:"विष्णु को कितनी भुजाएँ?", a:"चार"},
      {q:"मृत्युलोक कितने वर्ष चलता है?", a:"2500"},
      {q:"रावण के आने पर कौन सी दशा?", a:"राहू"},
    ]
  },
  {
    pairs:[
      {q:"सूर्यवंशियों पर किसकी दशा?", a:"ब्रहस्पति"},
      {q:"चन्द्रवंशियों पर किसकी दशा?", a:"चक्र"},
      {q:"काम-चिता से उतरकर किस चिता पर?", a:"ज्ञान"},
      {q:"सरस्वती किसकी एडाप्टेड बच्ची?", a:"ब्रह्मा"},
      {q:"शिवबाबा किस रथ में आए?", a:"ब्रह्मा"},
    ]
  }
];

let round=0, score=0, zoneData={}, dragId=null, checked=false;

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

function render(){
  const area=document.getElementById('game-area');
  if(round>=rounds.length){
    area.innerHTML=`<div class="final-card">
      <div class="badge">मुरली ड्रैग क्विज़</div>
      <div class="final-score">${score} / ${rounds.reduce((s,r)=>s+r.pairs.length,0)}</div>
      <div class="final-msg">${score>=8?'वाह! बहुत शानदार!':score>=5?'अच्छा प्रयास! और मेहनत करें।':'फिर से कोशिश करें!'}</div>
      <button class="btn btn-primary" onclick="restart()">फिर से खेलें</button>
    </div>`;
    return;
  }
  checked=false;
  zoneData={};
  const r=rounds[round];
  const answers=shuffle(r.pairs.map(p=>p.a));
  document.getElementById('rlbl').textContent=`राउंड ${round+1} / ${rounds.length}`;
  document.getElementById('prog').style.width=((round+1)/rounds.length*100)+'%';

  let qHTML='', zHTML='';
  r.pairs.forEach((p,i)=>{
    qHTML+=`<div class="q-card">${p.q}</div>`;
    zHTML+=`<div class="drop-zone" id="zone-${i}" data-idx="${i}" 
      ondragover="ev(event)" ondragleave="el(event)" ondrop="drop(event,${i})">
      <span style="color:var(--color-text-tertiary);font-size:12px;">यहाँ छोड़ें</span>
    </div>`;
  });

  let chipsHTML='';
  answers.forEach((a,i)=>{
    chipsHTML+=`<div class="drag-chip" id="chip-${i}" draggable="true"
      ondragstart="ds(event,'${a}','chip-${i}')"
      ondragend="de(event)">${a}</div>`;
  });

  area.innerHTML=`
    <div class="round-lbl">सही उत्तर खींचकर प्रश्न के सामने छोड़ें</div>
    <div class="cols">
      <div><div class="col-head">प्रश्न</div><div class="q-list">${qHTML}</div></div>
      <div><div class="col-head">उत्तर यहाँ छोड़ें</div><div class="a-list">${zHTML}</div></div>
    </div>
    <div class="col-head" style="margin-bottom:8px;">उत्तर चुनें</div>
    <div class="drag-pool">${chipsHTML}</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="checkAnswers()">जाँचें</button>
      <button class="btn" onclick="resetRound()">रीसेट</button>
    </div>
  `;
}

function ds(e,val,chipId){dragId={val,chipId};e.target.classList.add('dragging');}
function de(e){e.target.classList.remove('dragging');}
function ev(e){e.preventDefault();e.currentTarget.classList.add('over');}
function el(e){e.currentTarget.classList.remove('over');}

function drop(e,idx){
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  if(!dragId||checked)return;
  const prev=zoneData[idx];
  if(prev){
    const oldChip=document.getElementById(prev.chipId);
    if(oldChip)oldChip.classList.remove('used');
  }
  zoneData[idx]=dragId;
  const chip=document.getElementById(dragId.chipId);
  if(chip)chip.classList.add('used');
  const zone=document.getElementById('zone-'+idx);
  zone.className='drop-zone filled';
  zone.innerHTML=`<span>${dragId.val}</span><span class="remove-btn" onclick="removeFromZone(${idx})">✕</span>`;
  dragId=null;
}

function removeFromZone(idx){
  if(checked)return;
  const d=zoneData[idx];
  if(!d)return;
  const chip=document.getElementById(d.chipId);
  if(chip)chip.classList.remove('used');
  delete zoneData[idx];
  const zone=document.getElementById('zone-'+idx);
  zone.className='drop-zone';
  zone.innerHTML=`<span style="color:var(--color-text-tertiary);font-size:12px;">यहाँ छोड़ें</span>`;
}

function checkAnswers(){
  if(checked)return;
  checked=true;
  const r=rounds[round];
  let gained=0;
  r.pairs.forEach((p,i)=>{
    const zone=document.getElementById('zone-'+i);
    const placed=zoneData[i];
    if(placed && placed.val===p.a){
      zone.className='drop-zone correct';
      zone.innerHTML=`<span>${placed.val}</span><span style="font-size:14px;">✓</span>`;
      gained++;
    } else {
      zone.className='drop-zone wrong';
      const shown=placed?placed.val:'—';
      zone.innerHTML=`<span style="text-decoration:line-through">${shown}</span><span style="font-size:12px;margin-left:6px;">→ ${p.a}</span>`;
    }
  });
  score+=gained;
  document.getElementById('scr').textContent=`अंक: ${score}`;
  const btnRow=document.querySelector('.btn-row');
  btnRow.innerHTML=`<button class="btn btn-primary" onclick="nextRound()">${round<rounds.length-1?'अगला राउंड →':'परिणाम देखें'}</button>`;
}

function nextRound(){round++;render();}
function resetRound(){zoneData={};render();}
function restart(){round=0;score=0;render();}

render();
</script>
